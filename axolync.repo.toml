schema = "axolync.repo/v1"

[repo]
id = "axolync-songmetadata-adapters"
roles = ["consumable"]
display_name = "Axolync SongMetadata Adapters"
description = "Shared SongMetadata adapter catalog and provider migration support."

[source]
git_url = "https://github.com/korenmic/axolync-songmetadata-adapters.git"
default_ref = "master"
local_dev_path_hint = "../axolync-songmetadata-adapters"

[bootstrap]
install_mode = "managed-clone"
install_root = ".axolync/repos"
readme = "README.md"
agent_docs = ["README.md"]

[exports.docs]
bootstrap = ["README.md"]

[exports.tests]

[exports.catalogs]
songmetadata_providers = ["providers/catalog.json"]

[[consumes.repos]]
id = "axolync-contract"
use = "schema-and-runtime-contracts"
required = false
source = "managed"
